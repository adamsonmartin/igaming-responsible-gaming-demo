<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Slot Machine - iGaming Demo</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    
    body {
      margin: 0;
      background: #0f0a1f;
      color: #fff;
      font-family: 'Press Start 2P', system-ui;
      text-align: center;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: #1a1433;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 0 40px rgba(0, 255, 200, 0.3);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      font-size: 18px;
    }
    .balance {
      background: #111;
      padding: 10px 20px;
      border-radius: 10px;
      border: 2px solid #00ffcc;
    }
    .reels {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin: 40px 0;
    }
    .reel {
      width: 120px;
      height: 160px;
      background: #222;
      border: 6px solid #00ffcc;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 0 25px rgba(0, 255, 200, 0.6);
      font-size: 60px;
      line-height: 160px;
      transition: transform 0.8s cubic-bezier(0.68, -0.55, 0.27, 1.55);
    }
    .spin {
      animation: spinAnim 1.2s linear;
    }
    @keyframes spinAnim {
      0% { transform: rotateX(0deg); }
      100% { transform: rotateX(1440deg); }
    }
    .controls {
      display: flex;
      gap: 20px;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
    }
    button {
      background: #00ffcc;
      color: #000;
      border: none;
      padding: 15px 40px;
      font-size: 18px;
      border-radius: 10px;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover { background: #ff00cc; color: #fff; }
    .result {
      margin-top: 20px;
      font-size: 24px;
      min-height: 40px;
    }
    .win { color: #ff0; animation: flash 0.5s infinite; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎰 LIVE SLOT MACHINE</h1>
    <p style="margin-bottom:30px; opacity:0.8;">Freelance iGaming Demo – Martin Adamson</p>
    
    <div class="header">
      <div class="balance">Balance: <span id="balance">500</span> €</div>
      <div>Bet: <span id="bet">10</span> €</div>
    </div>

    <div class="reels">
      <div class="reel" id="reel1">🍒</div>
      <div class="reel" id="reel2">🍋</div>
      <div class="reel" id="reel3">🔔</div>
    </div>

    <div class="controls">
      <button onclick="changeBet(-5)">–</button>
      <button onclick="spin()">SPIN!</button>
      <button onclick="changeBet(5)">+</button>
    </div>

    <div id="result" class="result"></div>
  </div>

  <script>
    const symbols = ['🍒', '🍋', '🔔', 'BAR', '7', '⭐'];
    let balance = 500;
    let bet = 10;

    function updateUI() {
      document.getElementById('balance').textContent = balance;
      document.getElementById('bet').textContent = bet;
    }

    function getRandomSymbol() {
      return symbols[Math.floor(Math.random() * symbols.length)];
    }

    function spin() {
      if (balance < bet) {
        document.getElementById('result').innerHTML = '❌ Not enough balance!';
        return;
      }

      balance -= bet;
      updateUI();

      const reel1 = document.getElementById('reel1');
      const reel2 = document.getElementById('reel2');
      const reel3 = document.getElementById('reel3');

      // Spin animation
      reel1.classList.add('spin');
      reel2.classList.add('spin');
      reel3.classList.add('spin');

      setTimeout(() => {
        reel1.classList.remove('spin');
        reel2.classList.remove('spin');
        reel3.classList.remove('spin');

        const s1 = getRandomSymbol();
        const s2 = getRandomSymbol();
        const s3 = getRandomSymbol();

        reel1.textContent = s1;
        reel2.textContent = s2;
        reel3.textContent = s3;

        // Win check
        if (s1 === s2 && s2 === s3) {
          const winAmount = bet * 15;
          balance += winAmount;
          document.getElementById('result').innerHTML = `🎉 BIG WIN! +${winAmount}€`;
          document.getElementById('result').classList.add('win');
        } else if (s1 === s2 || s2 === s3 || s1 === s3) {
          const winAmount = bet * 3;
          balance += winAmount;
          document.getElementById('result').innerHTML = `✅ Small win +${winAmount}€`;
          document.getElementById('result').classList.add('win');
        } else {
          document.getElementById('result').innerHTML = '😔 Better luck next time...';
          document.getElementById('result').classList.remove('win');
        }
        updateUI();
      }, 1500);
    }

    function changeBet(amount) {
      bet = Math.max(5, bet + amount);
      updateUI();
    }

    // Initial load
    updateUI();
  </script>
</body>
</html>
