<!DOCTYPE html>
<html lang="et">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>iGaming Bonus Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
    h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #666; margin-bottom: 1.5rem; }
    .wrap { max-width: 480px; margin: 0 auto; }
    .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
    .section-title { font-size: 12px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
    .field { margin-bottom: 12px; }
    .field label { font-size: 13px; color: #666; display: block; margin-bottom: 4px; }
    .field input, .field select { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: #fff; }
    .metrics { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 1rem; }
    .metric { background: #f5f5f5; border-radius: 8px; padding: 12px; }
    .metric-label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .metric-val { font-size: 22px; font-weight: 500; }
    .row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
    .row:last-child { border-bottom: none; }
    .row-label { font-size: 14px; color: #666; }
    .row-val { font-size: 14px; font-weight: 500; }
    .badge { display: inline-block; font-size: 12px; padding: 3px 10px; border-radius: 8px; }
    .badge-green { background: #eafaf1; color: #1a7a4a; }
    .badge-warn { background: #fef9ec; color: #7a5c00; }
    .progress-bg { background: #f0f0f0; border-radius: 4px; height: 8px; overflow: hidden; margin-top: 6px; }
    .progress-fill { height: 100%; border-radius: 4px; transition: width 0.4s; background: #378ADD; }
    .wager-row { display: flex; gap: 8px; margin-top: 10px; }
    .wager-row input { flex: 1; padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
    .btn { border: 1px solid #ddd; background: transparent; color: #1a1a1a; border-radius: 8px; padding: 8px 16px; font-size: 14px; cursor: pointer; width: 100%; margin-top: 4px; }
    .btn:hover { background: #f5f5f5; }
  </style>
</head>
<body>
<div class="wrap">
  <h1>iGaming Bonus Calculator</h1>
  <p class="subtitle">Wagering Requirements · Bonus Tracking · Expiry</p>

  <div class="card">
    <div class="section-title">Boonuse seadistus</div>
    <div class="field">
      <label>Sissemakse summa (€)</label>
      <input type="number" id="deposit" value="100" min="1" oninput="calc()" />
    </div>
    <div class="field">
      <label>Boonuse protsent (%)</label>
      <select id="bonus-pct" oninput="calc()">
        <option value="50">50% boonus</option>
        <option value="100" selected>100% boonus</option>
        <option value="150">150% boonus</option>
        <option value="200">200% boonus</option>
      </select>
    </div>
    <div class="field">
      <label>Maksimaalne boonus (€)</label>
      <input type="number" id="max-bonus" value="200" min="1" oninput="calc()" />
    </div>
    <div class="field">
      <label>Wagering nõue (x kordades)</label>
      <select id="wagering" oninput="calc()">
        <option value="20">20x</option>
        <option value="30">30x</option>
        <option value="35" selected>35x</option>
        <option value="40">40x</option>
        <option value="50">50x</option>
      </select>
    </div>
    <div class="field">
      <label>Boonus aegub (päevades)</label>
      <select id="expiry" oninput="calc()">
        <option value="7">7 päeva</option>
        <option value="14">14 päeva</option>
        <option value="30" selected>30 päeva</option>
      </select>
    </div>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="metric-label">Boonus summa</div>
      <div class="metric-val" id="m-bonus">€100</div>
    </div>
    <div class="metric">
      <div class="metric-label">Wagering kokku</div>
      <div class="metric-val" id="m-wager">€3500</div>
    </div>
    <div class="metric">
      <div class="metric-label">Päevane eesmärk</div>
      <div class="metric-val" id="m-daily">€117</div>
    </div>
    <div class="metric">
      <div class="metric-label">Max väljamakse</div>
      <div class="metric-val" id="m-maxwin">€500</div>
    </div>
  </div>

  <div class="card">
    <div class="section-title">Wagering progress</div>
    <div class="row">
      <div class="row-label">Mängitud</div>
      <div class="row-val"><span id="w-done">€0</span> / <span id="w-total">€3500</span></div>
    </div>
    <div class="progress-bg"><div class="progress-fill" id="w-bar" style="width:0%"></div></div>
    <div class="wager-row">
      <input type="number" id="w-input" placeholder="Lisa mängitud summa €" min="1" />
      <button class="btn" style="width:auto;" onclick="addWager()">Lisa</button>
    </div>
  </div>

  <div class="card">
    <div class="section-title">Boonuse olek</div>
    <div class="row">
      <div class="row-label">Staatus</div>
      <div><span class="badge badge-green" id="status-badge">Aktiivne</span></div>
    </div>
    <div class="row">
      <div class="row-label">Aegub</div>
      <div class="row-val" id="expiry-date">–</div>
    </div>
    <div class="row">
      <div class="row-label">Väljamaks lubatud</div>
      <div class="row-val" id="cashout-status">Ei – wagering pooleli</div>
    </div>
    <button class="btn" onclick="resetBonus()">Tühista boonus</button>
  </div>
</div>

<script>
  var wagered = 0;
  var totalWager = 3500;

  function calc() {
    var dep = parseFloat(document.getElementById('deposit').value) || 0;
    var pct = parseFloat(document.getElementById('bonus-pct').value) || 100;
    var maxB = parseFloat(document.getElementById('max-bonus').value) || 200;
    var wagerX = parseFloat(document.getElementById('wagering').value) || 35;
    var expDays = parseFloat(document.getElementById('expiry').value) || 30;
    var bonus = Math.min(dep * pct / 100, maxB);
    totalWager = Math.round(bonus * wagerX);
    var daily = Math.ceil(totalWager / expDays);
    var maxWin = Math.round(bonus * 5);
    document.getElementById('m-bonus').textContent = '€' + Math.round(bonus);
    document.getElementById('m-wager').textContent = '€' + totalWager.toLocaleString();
    document.getElementById('m-daily').textContent = '€' + daily;
    document.getElementById('m-maxwin').textContent = '€' + maxWin.toLocaleString();
    document.getElementById('w-total').textContent = '€' + totalWager.toLocaleString();
    var today = new Date();
    today.setDate(today.getDate() + expDays);
    document.getElementById('expiry-date').textContent = today.toLocaleDateString('et-EE');
    updateProgress();
  }

  function addWager() {
    var v = parseFloat(document.getElementById('w-input').value) || 0;
    if (v <= 0) return;
    wagered = Math.min(wagered + v, totalWager);
    document.getElementById('w-input').value = '';
    updateProgress();
  }

  function updateProgress() {
    var pct = totalWager > 0 ? Math.min((wagered / totalWager) * 100, 100) : 0;
    document.getElementById('w-done').textContent = '€' + Math.round(wagered).toLocaleString();
    document.getElementById('w-bar').style.width = pct.toFixed(1) + '%';
    if (pct >= 100) {
      document.getElementById('w-bar').style.background = '#1D9E75';
      document.getElementById('status-badge').textContent = 'Täidetud';
      document.getElementById('status-badge').className = 'badge badge-green';
      document.getElementById('cashout-status').textContent = 'Jah – saad välja võtta';
    } else if (pct > 0) {
      document.getElementById('status-badge').textContent = Math.round(pct) + '% tehtud';
      document.getElementById('status-badge').className = 'badge badge-warn';
      document.getElementById('cashout-status').textContent = 'Ei – ' + Math.round(100 - pct) + '% puudu';
    }
  }

  function resetBonus() {
    wagered = 0;
    document.getElementById('w-bar').style.width = '0%';
    document.getElementById('w-bar').style.background = '#378ADD';
    document.getElementById('w-done').textContent = '€0';
    document.getElementById('status-badge').textContent = 'Aktiivne';
    document.getElementById('status-badge').className = 'badge badge-green';
    document.getElementById('cashout-status').textContent = 'Ei – wagering pooleli';
  }

  calc();
</script>
</body>
</html>
